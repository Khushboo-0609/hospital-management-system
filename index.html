<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>🏥 Hospital Management System</h1>

    <p class="subtitle">
        Patient Registration Form
    </p>

    <div class="image-box">
        <img src="images.jpeg" alt="Hospital">
    </div>

    <form action="/register"
          method="GET"
          onsubmit="return confirm('Are you sure you want to register this patient?');">

        <label>Patient Name</label>

        <input
        type="text"
        name="name"
        placeholder="Enter Patient Name"
        required>

        <label>Age</label>

        <input
        type="number"
        name="age"
        placeholder="Enter Age"
        required>

        <label>Gender</label>

        <select name="gender" required>

            <option value="">Select Gender</option>

            <option>Male</option>

            <option>Female</option>

            <option>Other</option>

        </select>

        <label>Phone Number</label>

        <input
        type="tel"
        name="phone"
        placeholder="Enter Phone Number"
        pattern="[0-9]{10}"
        required>

        <label>Disease</label>

        <input
        type="text"
        name="disease"
        placeholder="Enter Disease"
        required>

        <label>Admit Date</label>

        <input
        type="date"
        name="date"
        required>

        <button type="submit">
            Register Patient
        </button>

    </form>

    <div class="buttons">

        <a href="/view">
            View Patients
        </a>

    </div>

</div>

</body>
</html>
